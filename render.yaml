services:
  - type: web
    name: ssscalc
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app --bind 0.0.0.0:$PORT -k uvicorn.workers.UvicornWorker
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: DEFAULT_YEAR
        value: 2024